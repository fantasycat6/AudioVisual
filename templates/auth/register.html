<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AudioVisual</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                </svg>
                <h1>AudioVisual</h1>
                <p>创建您的账号</p>
            </div>

            <div id="auth-error" class="auth-alert auth-alert-error" style="display:none;"></div>
            <div id="auth-success" class="auth-alert auth-alert-success" style="display:none;"></div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" class="form-input"
                           placeholder="2-20个字符" required minlength="2" maxlength="20" autocomplete="username">
                    <div class="form-hint">用户名将公开显示</div>
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" class="form-input"
                           placeholder="请输入有效邮箱" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="至少6个字符" required minlength="6" autocomplete="new-password">
                        <button type="button" class="eye-toggle" onclick="togglePassword('password')">👁</button>
                    </div>
                    <div class="password-strength" id="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <div class="form-hint" id="strength-text"></div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">确认密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" class="form-input"
                               placeholder="再次输入密码" required autocomplete="new-password">
                        <button type="button" class="eye-toggle" onclick="togglePassword('confirm_password')">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="register-btn">
                    <span class="btn-text">注 册</span>
                    <span class="btn-loading" style="display:none;">注册中...</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>已有账号？<a href="{{ url_for('auth.login') }}" class="auth-link">立即登录</a></p>
            </div>
        </div>
        <div class="auth-bg-decor"></div>
    </div>

    <script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    // 密码强度检测
    document.getElementById('password').addEventListener('input', function() {
        const val = this.value;
        const fill = document.getElementById('strength-fill');
        const text = document.getElementById('strength-text');
        let strength = 0;
        if (val.length >= 6) strength++;
        if (val.length >= 10) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;
        const levels = ['', '弱', '一般', '较强', '强', '非常强'];
        const colors = ['', '#ff6768', '#ff9800', '#ffd700', '#4caf50', '#00bcd4'];
        fill.style.width = (strength * 20) + '%';
        fill.style.background = colors[strength] || '';
        text.textContent = strength > 0 ? '密码强度：' + (levels[strength] || '') : '';
        text.style.color = colors[strength] || '';
    });

    document.getElementById('register-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('register-btn');
        const errDiv = document.getElementById('auth-error');
        const sucDiv = document.getElementById('auth-success');
        btn.querySelector('.btn-text').style.display = 'none';
        btn.querySelector('.btn-loading').style.display = 'inline';
        btn.disabled = true;
        errDiv.style.display = 'none';
        sucDiv.style.display = 'none';

        const data = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            confirm_password: document.getElementById('confirm_password').value
        };

        try {
            const res = await fetch('{{ url_for("auth.register") }}', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                sucDiv.textContent = result.message;
                sucDiv.style.display = 'block';
                setTimeout(() => window.location.href = result.redirect, 1200);
            } else {
                errDiv.textContent = result.message;
                errDiv.style.display = 'block';
            }
        } catch(err) {
            errDiv.textContent = '网络错误，请稍后重试';
            errDiv.style.display = 'block';
        } finally {
            btn.querySelector('.btn-text').style.display = 'inline';
            btn.querySelector('.btn-loading').style.display = 'none';
            btn.disabled = false;
        }
    });
    </script>
</body>
</html>
